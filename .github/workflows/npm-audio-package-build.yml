name: Build and GitHub Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'npm-audio-package-build'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      AUDIO_API_DIR: packages/react-native-audio-api
      PACKAGE_NAME: PLACEHOLDER
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'yarn'

      - name: Update NPM
        run: npm install -g npm@latest

      - name: Install monorepo dependencies
        run: yarn install --immutable

      - name: Build package
        id: build
        working-directory: ${{ env.AUDIO_API_DIR }}
        run: ./scripts/create-package.sh

      - name: Check if any node_modules were packed
        id: check_node_modules
        working-directory: ${{ env.AUDIO_API_DIR }}
        run: >-
          ! grep --silent -E "node_modules/.+" build.log

      - name: Show build log
        working-directory: ${{ env.AUDIO_API_DIR }}
        if: failure() && steps.build.outcome == 'failure'
        run: cat build.log

      - name: Show packed node_modules
        working-directory: ${{ env.AUDIO_API_DIR }}
        if: failure() && steps.check_node_modules.outcome == 'failure'
        run: >-
          ! grep -E "node_modules/.+" build.log

      - name: Add package name to env
        working-directory: ${{ env.AUDIO_API_DIR }}
        run: echo "PACKAGE_NAME=$(ls -1 *.tgz 2>/dev/null | head -1)" >> $GITHUB_ENV

      - name: Assert package name
        if: ${{ env.PACKAGE_NAME == 'PLACEHOLDER' }}
        run: exit 1

      - name: Rename package to include build ID
        working-directory: ${{ env.AUDIO_API_DIR }}
        run: |
          BUILD_ID="${{ github.run_id }}"
          NEW_NAME="${PACKAGE_NAME%.tgz}-build-${BUILD_ID}.tgz"
          mv "$PACKAGE_NAME" "$NEW_NAME"
          echo "PACKAGE_NAME=$NEW_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_id }}
          name: Build ${{ github.run_number }}
          files: ${{ env.AUDIO_API_DIR }}/${{ env.PACKAGE_NAME }}
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
